<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- cork-brown rounded background -->
  <rect width="32" height="32" rx="8" fill="#b97c40"/>

  <!-- polaroid white frame -->
  <rect x="5" y="4" width="22" height="25" rx="3" fill="white"/>

  <!-- photo area -->
  <rect x="7" y="6" width="18" height="14" rx="2" fill="#d4956a"/>

  <!-- sky gradient suggestion -->
  <rect x="7" y="6" width="18" height="7" rx="2" fill="#c2e0f4"/>

  <!-- sun -->
  <circle cx="20" cy="10" r="2.5" fill="#f9d030"/>

  <!-- hills -->
  <ellipse cx="10" cy="20" rx="6" ry="4" fill="#8B5E3C"/>
  <ellipse cx="19" cy="20" rx="6" ry="3.5" fill="#a06a2e"/>

  <!-- polaroid bottom caption strip (white) -->
  <!-- already part of the white frame, just add a subtle line -->
  <line x1="5" y1="21" x2="27" y2="21" stroke="#eee" stroke-width="0.5"/>

  <!-- tiny caption squiggle -->
  <rect x="10" y="24" width="12" height="2" rx="1" fill="#e0e0e0"/>
</svg>
